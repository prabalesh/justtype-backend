name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          # Build the Go backend for linux/amd64
          GOOS=linux GOARCH=amd64 go build -o justtype-backend ./cmd/server

      - name: Copy binary via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "justtype-backend,ecosystem.config.cjs"
          target: "/home/${{ secrets.SSH_USER }}/zenko-backend"
          # Since files are in root, we don't need strip_components unless they were in a subfolder

      - name: Restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/zenko-backend
            chmod +x justtype-backend
            # Reload PM2 using the ecosystem file or start if it doesn't exist
            pm2 reload ecosystem.config.cjs || pm2 start ecosystem.config.cjs
            pm2 save
